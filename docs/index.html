<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sector Command</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;
  --blue:#58a6ff;--orange:#f0883e;--purple:#b084ff;
  --card2:#1c2128;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
a{color:var(--blue);text-decoration:none}

/* header */
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:10}
.logo{font-size:17px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:12px}
.updated{color:var(--muted);font-size:12px}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--blue);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.refresh-btn:hover{background:#21262d}

/* tabs */
.tab-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab.active{color:var(--text);border-bottom-color:var(--blue)}
.tab:hover{color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* page layout */
.page{max-width:1100px;margin:0 auto;padding:20px 16px;display:grid;gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr}}

/* big call card */
.call-ticker{font-size:44px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.call-name{color:var(--muted);font-size:13px;margin-bottom:16px}
.conf-bar-bg{background:#21262d;border-radius:6px;height:12px;margin:6px 0 5px;overflow:hidden}
.conf-bar{height:12px;border-radius:6px;transition:width .8s ease}
.conf-label{font-size:15px;font-weight:700;margin-bottom:10px}
.call-size{background:#21262d;border-radius:6px;padding:8px 12px;font-size:13px;margin-top:8px}
.abstain-box{background:#21262d;border-left:3px solid var(--yellow);padding:10px 12px;border-radius:0 6px 6px 0;font-size:13px;color:var(--yellow);margin-top:12px}
.crisis-box{background:#1e0a0a;border:1px solid var(--red);border-radius:8px;padding:12px;font-size:14px;color:var(--red);font-weight:600;margin-top:8px}

/* stat row */
.stat-row{display:flex;gap:20px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.stat-val{font-size:22px;font-weight:700;line-height:1.1}
.stat-val.sm{font-size:15px}

/* signal list */
.sig{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #21262d}
.sig:last-child{border-bottom:none}
.sig-k{font-size:12px;color:var(--muted);flex-shrink:0;padding-right:8px}
.sig-v{font-size:12px;font-weight:600;text-align:right}

/* tags / pills */
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase}
.tag-high{background:#1a3d1a;color:var(--green)}
.tag-med{background:#3a2f00;color:var(--yellow)}
.tag-low{background:#0d2040;color:var(--blue)}
.tag-spec{background:#2a1a40;color:var(--purple)}
.tag-avoid{background:#3d1a1a;color:var(--red)}
.pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.pill-green{background:#1a3a1a;color:var(--green)}
.pill-red{background:#3a1a1a;color:var(--red)}
.pill-yellow{background:#3a2f00;color:var(--yellow)}
.pill-blue{background:#0d2040;color:var(--blue)}

/* opportunity cards */
.opp{border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;transition:border-color .15s}
.opp:last-child{margin-bottom:0}
.opp:hover{border-color:#444c56}
.opp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.opp-ticker{font-size:22px;font-weight:800;line-height:1}
.opp-label{font-size:12px;color:var(--muted);font-weight:600}
.opp-name{font-size:12px;color:var(--muted);margin-top:2px}
.opp-size{font-size:13px;margin:6px 0}
.opp-reasons{list-style:none;margin-top:6px}
.opp-reasons li{font-size:12px;color:var(--muted);padding:2px 0 2px 14px;position:relative;line-height:1.4}
.opp-reasons li::before{content:"›";position:absolute;left:0;color:var(--blue)}

/* stocks / alpha */
.alpha-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #21262d}
.alpha-row:last-child{border-bottom:none}
.alpha-lft{flex:1;min-width:0}
.alpha-ticker{font-weight:700;font-size:15px}
.alpha-meta{font-size:11px;color:var(--muted);margin-top:2px}
.alpha-tagline{font-size:11px;color:var(--blue);margin-top:3px}
.alpha-rgt{text-align:right;flex-shrink:0;padding-left:12px}

/* portfolio */
.bal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:18px}
.bal-card{background:var(--card2);border-radius:8px;padding:12px}
.bal-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.bal-val{font-size:22px;font-weight:800;line-height:1.1}
.bal-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* alloc bar */
.alloc-bar-wrap{margin:16px 0 4px}
.alloc-bar-track{height:18px;border-radius:9px;overflow:hidden;display:flex;background:#21262d;margin:6px 0}
.alloc-seg{height:100%;transition:width .6s ease}
.alloc-legend{display:flex;gap:16px;flex-wrap:wrap}
.alloc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}

/* holdings table */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600}
tbody td{padding:9px 10px;border-bottom:1px solid #21262d;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#1c2128}

/* journal */
.jrow{border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;transition:border-color .15s}
.jrow:last-child{margin-bottom:0}
.jrow:hover{border-color:#444c56}
.jrow-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.jrow-meta{font-size:12px;color:var(--muted)}
.jrow-rec{font-size:16px;font-weight:700;margin-bottom:4px}
.jrow-rec .ticker{font-size:20px}
.jrow-headline{font-size:12px;color:var(--muted);font-style:italic;margin-top:4px}
.jrow-reply{margin-top:8px;padding:8px 10px;background:var(--card2);border-radius:6px;font-size:12px}
.trace-toggle{color:var(--blue);cursor:pointer;font-size:12px;margin-top:8px;display:inline-flex;align-items:center;gap:4px;user-select:none}
.trace-body{margin-top:8px;display:none}
.trace-item{font-size:12px;color:var(--muted);padding:3px 0;border-bottom:1px solid #21262d;line-height:1.5}
.trace-item:last-child{border-bottom:none}

/* alerts */
.alert-banner{background:#200a0a;border:1px solid var(--red);border-radius:8px;padding:12px;margin-bottom:10px}
.alert-banner .alert-title{font-weight:700;color:var(--red);font-size:13px;margin-bottom:4px}

/* perf numbers */
.perf-row{display:flex;gap:20px;flex-wrap:wrap}
.perf-stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.perf-stat .val{font-size:24px;font-weight:800}

/* misc */
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.empty{color:var(--muted);font-size:13px;padding:16px 0;line-height:1.6}
.empty-icon{font-size:28px;margin-bottom:8px}
.green{color:var(--green)} .red{color:var(--red)} .yellow{color:var(--yellow)}
.blue{color:var(--blue)} .muted{color:var(--muted)} .bold{font-weight:700}
.small{font-size:12px} .mono{font-family:monospace}
.freshness{text-align:center;padding:4px 0 18px;color:var(--muted);font-size:12px}
code{background:#21262d;padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace}
</style>
</head>
<body>

<header>
  <div class="logo">📡 SECTOR COMMAND</div>
  <div class="header-right">
    <span class="updated" id="updated-ts">Loading…</span>
    <button class="refresh-btn" onclick="location.href=location.pathname+'?t='+Date.now()">⟳ Refresh</button>
  </div>
</header>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('today',this)">📊 Today</div>
  <div class="tab" onclick="switchTab('opportunities',this)">🎯 Opportunities</div>
  <div class="tab" onclick="switchTab('stocks',this)">📈 My Positions</div>
  <div class="tab" onclick="switchTab('portfolio',this)">💼 Portfolio</div>
  <div class="tab" onclick="switchTab('journal',this)">📋 Journal</div>
</div>

<div id="tab-today"        class="tab-content active"><div class="page" id="pg-today"></div></div>
<div id="tab-opportunities" class="tab-content"><div class="page" id="pg-opps"></div></div>
<div id="tab-stocks"       class="tab-content"><div class="page" id="pg-stocks"></div></div>
<div id="tab-portfolio"    class="tab-content"><div class="page" id="pg-portfolio"></div></div>
<div id="tab-journal"      class="tab-content"><div class="page" id="pg-journal"></div></div>

<script>
// ── Tab switching ─────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Lookups ───────────────────────────────────────────────────────────
const SNAMES = {
  XLF:"Financials", XLK:"Technology", XLE:"Energy", XLV:"Health Care",
  XLY:"Consumer Disc.", XLP:"Consumer Staples", XLI:"Industrials", XLB:"Materials",
  XLRE:"Real Estate", XLU:"Utilities", XLC:"Comm. Services",
  SPY:"S&P 500 Index", QQQ:"Nasdaq 100", BIL:"T-Bills (Cash)",
  TLT:"Long-Term Bonds", GLD:"Gold", "BTC-USD":"Bitcoin", "ETH-USD":"Ethereum"
};
const COLORS = ["#58a6ff","#3fb950","#b084ff","#f0883e","#d29922"];

// ── Data fetching ─────────────────────────────────────────────────────
const REPO = "cameroncc333/sector-command-live";
async function fetchJSON(local, ghPath) {
  try {
    const r = await fetch(local + "?" + Date.now(), {cache:"no-cache"});
    if (r.ok) return await r.json();
  } catch(_){}
  if (ghPath) {
    try {
      const r = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${ghPath}`,
        {headers:{Accept:"application/vnd.github.raw+json"}, cache:"no-cache"}
      );
      if (r.ok) return await r.json();
    } catch(_){}
  }
  return null;
}

async function init() {
  const [briefing, journal, live] = await Promise.all([
    fetchJSON("briefing.json", "docs/briefing.json"),
    fetchJSON("journal.json",  "docs/journal.json"),
    fetch("/api/webhook?t="+Date.now(),{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null),
  ]);

  if (!briefing) {
    const msg = `<div class="card" style="text-align:center;padding:40px 20px">
      <div class="empty-icon">⏳</div>
      <div class="bold" style="font-size:16px;margin-bottom:8px">Waiting for first briefing</div>
      <div class="muted">GitHub Actions runs the signal engine at 9AM &amp; 4:30PM EDT on weekdays.<br><br>
      To trigger one now: go to your GitHub repo → Actions → "Sector Command Live — Daily Signals" → Run workflow.</div>
    </div>`;
    ['pg-today','pg-opps','pg-stocks','pg-portfolio'].forEach(id =>
      document.getElementById(id).innerHTML = msg
    );
    document.getElementById('pg-journal').innerHTML = emptyJournalCard([]);
    document.getElementById('updated-ts').textContent = 'No data yet';
    return;
  }

  // Overlay live Redis balance/holdings from the webhook so the Portfolio tab
  // always reflects what was set via Telegram commands (stored in Redis),
  // even before the next GitHub Actions run regenerates briefing.json.
  if (live && live.balance != null) {
    briefing.portfolio_snap = briefing.portfolio_snap || {};
    briefing.portfolio_snap.balance = live.balance;  // Redis balance is always authoritative

    const snapH = briefing.portfolio_snap.holdings || [];
    const liveH = Array.isArray(live.holdings) ? live.holdings : [];
    const snapTickers = new Set(snapH.map(h => h.ticker));
    const liveTickers = new Set(liveH.map(h => h.ticker));
    const holdingsMatch = liveH.length === snapH.length &&
      liveH.every(h => snapTickers.has(h.ticker)) && snapH.every(h => liveTickers.has(h.ticker));

    if (!holdingsMatch || !snapH.length) {
      // Use live Redis holdings (no prices yet — GitHub Actions will add them next run)
      const invested = liveH.reduce((s, h) => s + (h.dollar_value || 0), 0);
      briefing.portfolio_snap.holdings = liveH.map(h => ({
        ticker: h.ticker,
        date_bought: h.date_bought || '—',
        avg_cost: h.avg_cost || null,
        current_price: null,  // filled in by GitHub Actions next run
        cost_basis: h.dollar_value || 0,
        pnl_dollar: 0,
        pnl_pct: 0,
        alloc_pct: h.alloc_pct,
        notes: h.notes || null,
      }));
      briefing.portfolio_snap.total_invested = invested;
      briefing.portfolio_snap.cash_remaining = live.balance - invested;
    } else {
      // Snap already has the right tickers (and may have live prices from GitHub Actions)
      briefing.portfolio_snap.cash_remaining = live.balance - (briefing.portfolio_snap.total_invested || 0);
    }
  }

  const gen = (briefing.freshness||{}).generated_utc || briefing.date || '—';
  document.getElementById('updated-ts').textContent = 'Last run: ' + gen;

  renderToday(briefing);
  renderOpportunities(briefing);
  renderStocks(briefing);
  renderPortfolio(briefing);
  renderJournal(Array.isArray(journal) ? journal : []);
}

// ── helpers ───────────────────────────────────────────────────────────
function h(n){return n>=0?`<span class="green">+${n.toFixed(1)}%</span>`:`<span class="red">${n.toFixed(1)}%</span>`}
function hd(n){return n>=0?`<span class="green">+$${Math.abs(n).toLocaleString()}</span>`:`<span class="red">-$${Math.abs(n).toLocaleString()}</span>`}
function fmt$(n){return n!=null?'$'+parseFloat(n).toLocaleString():'—'}
function confColor(c){return c>=80?"var(--green)":c>=65?"var(--green)":c>=50?"var(--yellow)":c>=35?"var(--orange)":"var(--red)"}
function confText(c){return c>=80?`${c}% — MUST BUY 🔥`:c>=65?`${c}% — DEFINITELY BUY ✅`:c>=50?`${c}% — PROBABLY — solid signal 🟡`:c>=35?`${c}% — MAYBE — weak signal ⚠️`:`${c}% — SKIP ❌`}
function tagClass(cv){return{HIGH:"tag-high",MEDIUM:"tag-med",LOW:"tag-low",SPECULATIVE:"tag-spec",AVOID:"tag-avoid"}[cv]||"tag-low"}
function freshBar(b){
  const fr=b.freshness||{};
  const stub=fr.rl_source!=="LIVE"?` &nbsp;<span class="red bold">⚠️ RL STUB — run generate_rl_signal.py</span>`:"";
  return `<div class="freshness">
    RL: <strong>${fr.rl_source||"?"}</strong>${stub} &nbsp;·&nbsp;
    Market data: <strong>${fr.market_data||"?"}</strong> &nbsp;·&nbsp;
    News: <strong>${fr.news||"?"}</strong> &nbsp;·&nbsp;
    Generated: <strong>${fr.generated_utc||"—"}</strong>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// TAB 1 — TODAY
// ═══════════════════════════════════════════════════════════════════
function renderToday(b) {
  document.getElementById('pg-today').innerHTML = `
    ${alertsSection(b)}
    <div class="grid2" style="align-items:start">
      ${callCard(b)}
      ${marketCard(b)}
    </div>
    <div class="grid2">
      ${signalsCard(b)}
      ${macroCard(b)}
    </div>
    ${agentVotesCard(b)}
    ${decisionTraceCard(b)}
    ${freshBar(b)}
  `;
}

function callCard(b) {
  const conf   = parseInt(b.confidence)||50;
  const ticker = b.ticker||"—";
  const abstain= b.abstain_reason||"";
  const ranked = b.ranked_opportunities||[];
  const top    = ranked[0]||{};
  const sname  = SNAMES[ticker]||ticker;

  const sizeStr = top.suggested_dollar
    ? `Suggested size: <strong>${fmt$(top.suggested_dollar)}</strong> (~${top.suggested_pct||9}% of balance)`
    : top.suggested_pct ? `Suggested size: ~${top.suggested_pct}% of balance` : "";

  let body;
  if (ticker==="BIL") {
    body = `<div class="crisis-box">⛔ CRISIS MODE — VIX is dangerously high. System forces cash. Do not buy anything.</div>`;
  } else if (ticker==="SPY" && abstain) {
    body = `
      <div class="call-ticker blue">${ticker}</div>
      <div class="call-name">${sname}</div>
      <div class="abstain-box">⚠️ No strong sector conviction today<br><span class="small">${abstain}</span></div>`;
  } else {
    body = `
      <div class="call-ticker" style="color:${confColor(conf)}">${ticker}</div>
      <div class="call-name">${sname}</div>
      <div class="conf-bar-bg"><div class="conf-bar" style="width:${Math.min(100,conf)}%;background:${confColor(conf)}"></div></div>
      <div class="conf-label" style="color:${confColor(conf)}">${confText(conf)}</div>
      ${sizeStr?`<div class="call-size">${sizeStr}</div>`:""}`;
  }

  const replyGuide = ticker!=="BIL" ? `
    <div class="divider"></div>
    <div class="small muted">Reply in Telegram: &nbsp;<code>BUY A</code> &nbsp;<code>SKIP</code> &nbsp;<code>BUY ${ticker}</code></div>` : "";

  return `<div class="card">
    <div class="card-title">Today's Call</div>
    ${body}
    ${replyGuide}
  </div>`;
}

function marketCard(b) {
  const vix    = parseFloat(b.vix)||0;
  const regime = (b.regime||"NORMAL").toUpperCase();
  const vts    = (b.macro||{}).vix_term_structure||{};
  const opts   = b.options_signals||{};
  const fomc   = b.fomc_live||{};

  let mktColor,mktLabel;
  if(vts.ts_regime==="BACKWARDATION"){mktColor="var(--red)";mktLabel="⚠️ Fear Spike";}
  else if(vix<15||vts.ts_regime==="STEEP_CONTANGO"){mktColor="var(--green)";mktLabel="✅ Calm";}
  else if(vix<22){mktColor="var(--yellow)";mktLabel="🟡 Normal";}
  else if(vix<30){mktColor="var(--orange)";mktLabel="🟠 Choppy";}
  else{mktColor="var(--red)";mktLabel="🔴 Stressed";}

  const regColor={CALM:"var(--green)",NORMAL:"var(--yellow)",STRESSED:"var(--red)"}[regime]||"var(--muted)";
  const spy_pcr = opts.SPY||opts.QQQ;
  const pcrLine = spy_pcr
    ? `<div class="sig"><span class="sig-k">Put/Call Ratio</span><span class="sig-v">${{FEARFUL:"😰 Fearful",COMPLACENT:"😎 Complacent",NEUTRAL:"😐 Neutral"}[spy_pcr.signal]||spy_pcr.signal}</span></div>`
    : "";
  const vtsLine = vts.ts_regime
    ? `<div class="sig"><span class="sig-k">VIX Term Structure</span><span class="sig-v" style="color:${vts.ts_regime==="BACKWARDATION"?"var(--red)":vts.ts_regime==="STEEP_CONTANGO"?"var(--green)":"var(--yellow)"}">${vts.ts_regime} (ratio ${vts.ratio||"?"})</span></div>`
    : "";
  const fomcLine = fomc.active
    ? `<div class="sig"><span class="sig-k">FOMC Live</span><span class="sig-v" style="color:${fomc.label==="HAWKISH"?"var(--red)":fomc.label==="DOVISH"?"var(--green)":"var(--yellow)"}">${{"DOVISH":"🕊️","HAWKISH":"🦅","NEUTRAL":"⚖️"}[fomc.label]||"⏳"} ${fomc.label||""}</span></div>`
    : "";

  return `<div class="card">
    <div class="card-title">Market Status</div>
    <div class="stat-row" style="margin-bottom:16px">
      <div class="stat">
        <div class="stat-lbl">VIX</div>
        <div class="stat-val" style="color:${mktColor}">${vix.toFixed(1)}</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Regime</div>
        <div class="stat-val sm" style="color:${regColor}">${regime}</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Conditions</div>
        <div class="stat-val sm" style="color:${mktColor}">${mktLabel}</div>
      </div>
      ${b.rsi?`<div class="stat"><div class="stat-lbl">RSI</div><div class="stat-val sm">${Math.round(b.rsi)}</div></div>`:""}
    </div>
    ${pcrLine}${vtsLine}${fomcLine}
  </div>`;
}

function signalsCard(b) {
  const rows=[];
  const ns=b.news_sentiment;
  if(ns!=null){
    const tone=ns>0.15?"Bullish 🟢":ns<-0.15?"Bearish 🔴":"Neutral ⚪";
    const cls=ns>0.15?"green":ns<-0.15?"red":"muted";
    rows.push(["News Sentiment (FinBERT)",`<span class="${cls}">${ns>=0?"+":""}${ns.toFixed(2)} — ${tone}</span>`]);
  }
  if(b.news_headline) rows.push(["Top Headline",`<em class="muted">"${b.news_headline.slice(0,70)}${b.news_headline.length>70?"…":""}"</em>`]);
  if(b.rel_strength!=null){
    const rs=b.rel_strength;
    rows.push(["Rel-Strength vs SPY",`<span class="${rs>=0?"green":"red"}">${rs>=0?"+":""}${(rs*100).toFixed(1)}%</span>`]);
  }
  const ag=(b.repo_detail||{}).agreement||{};
  if(ag.total>0){
    const ratio=ag.agree/ag.total;
    rows.push(["Multi-Repo Corroboration",`<span class="${ratio>=.66?"green":ratio===0?"red":"yellow"}">${ag.agree}/${ag.total} strategies agree</span>`]);
  }
  const soc=b.social_sentiment||{};
  Object.entries(soc).slice(0,2).forEach(([t,s])=>{
    const cls={BULLISH:"green",BEARISH:"red"}[s.signal]||"muted";
    rows.push([`StockTwits ${t}`,`<span class="${cls}">${s.signal} (${(s.score||0)>=0?"+":""}${(s.score||0).toFixed(2)})</span>`]);
  });
  const html=rows.map(([k,v])=>`<div class="sig"><span class="sig-k">${k}</span><span class="sig-v">${v}</span></div>`).join("");
  return `<div class="card"><div class="card-title">Signals &amp; Sentiment</div>${html||'<div class="empty">No signal data yet.</div>'}</div>`;
}

function macroCard(b) {
  const macro=b.macro||{};
  const yc=macro.yield_curve||{};
  const dxy=macro.dollar||{};
  const rows=[];
  if(yc.spread!=null){
    const cls=yc.inverted?"red":yc.spread<0.5?"yellow":"green";
    const inv=yc.inverted?" ⚠️ INVERTED":"";
    rows.push(["Yield Curve (10yr-2yr)",`<span class="${cls}">${yc.spread}%${inv}</span><span class="muted small"> · 10yr ${yc.ten_yr}%</span>`]);
  }
  if(dxy.dxy!=null){
    const chg=dxy.dxy_change||0;
    rows.push(["US Dollar (DXY)",`${dxy.dxy} <span class="${chg>=0?"green":"red"}">${chg>=0?"+":""}${chg.toFixed(2)}%</span>`]);
  }
  const vts=(macro.vix_term_structure||{});
  if(vts.vix&&vts.vix3m){
    rows.push(["VIX / VIX3M",`${vts.vix} / ${vts.vix3m}`]);
  }
  const html=rows.map(([k,v])=>`<div class="sig"><span class="sig-k">${k}</span><span class="sig-v">${v}</span></div>`).join("");
  return `<div class="card"><div class="card-title">Macro Indicators</div>${html||'<div class="empty">No macro data yet.</div>'}</div>`;
}

function agentVotesCard(b) {
  const votes=b.rl_votes||{};
  if(!Object.keys(votes).length) return "";
  const voteHtml=Object.entries(votes).map(([agent,vote])=>
    `<div class="sig"><span class="sig-k bold">${agent}</span><span class="sig-v">${vote}</span></div>`
  ).join("");
  return `<div class="card"><div class="card-title">RL Agent Votes (PPO / A2C / SAC)</div>
    ${voteHtml}
    <div class="small muted" style="margin-top:10px">Each agent uses a different algorithm and may pick different sectors. 3/3 agreement is rare but high conviction. 1/3 lowers confidence by −10 pts but does not block the trade.</div>
  </div>`;
}

function decisionTraceCard(b) {
  const trace=(b.why_trace||[]).slice(0,20);
  if(!trace.length) return "";
  const id="trace-today";
  return `<div class="card"><div class="card-title">Decision Trace — Why This Call</div>
    <div id="${id}" style="display:none">${trace.map(t=>`<div class="trace-item">${t}</div>`).join("")}</div>
    <div class="trace-toggle" onclick="toggleEl('${id}',this)">▶ Show ${trace.length} reasoning steps</div>
  </div>`;
}

function alertsSection(b) {
  const exits=b.equity_alpha_exit_alerts||[];
  const sells=(b.sell_alerts||"").replace(/<[^>]*>/g,"").trim();
  const earn=(b.earnings_warning||"").replace(/<[^>]*>/g,"").trim();
  if(!exits.length&&!sells&&!earn) return "";
  const items=exits.map(e=>`
    <div class="alert-banner">
      <div class="alert-title">${e.urgency==="URGENT"?"🔴":"🟡"} ${e.ticker} — ${e.signal_type}</div>
      <div class="small muted">${e.detail||""}</div>
    </div>`).join("");
  return `<div class="card" style="border-color:var(--red)">
    <div class="card-title" style="color:var(--red)">⚠️ Alerts — Review Required</div>
    ${items}
    ${sells?`<div class="small" style="white-space:pre-line;margin-bottom:8px">${sells}</div>`:""}
    ${earn?`<div class="small muted">${earn}</div>`:""}
  </div>`;
}

      <div class="card-title">Balance Overview</div>
      <div class="bal-grid">${summaryCards}</div>
      ${allocBar}
    </div>
    ${holdings.length?`
    <div class="card">
      <div class="card-title">Open Positions — Real Money</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Ticker</th><th>Date Bought</th><th>Avg Cost</th><th>Current Price</th>
            <th>Cost Basis</th><th>Unrealized P&amp;L</th><th>Allocation</th>
          </tr></thead>
          <tbody>${holdRows}</tbody>
        </table>
      </div>
      <div class="small muted" style="margin-top:10px">
        Current prices refresh 3×/day (9AM, 12PM, 3:30PM EDT). &nbsp;·&nbsp; Log: <code>BOUGHT XLF 500</code> &nbsp;·&nbsp; Remove: <code>SOLD XLF</code>
      </div>
    </div>`
    :`<div class="card"><div class="empty"><div class="empty-icon">📭</div>No real-money positions logged yet.<br>Send <code>BOUGHT XLF 500</code> in Telegram to log a position.</div></div>`}
    ${alpacaHtml}
    ${paperHtml}
    ${freshBar(b)}`;
}

// ═══════════════════════════════════════════════════════════════════
// TAB 5 — JOURNAL
// ═══════════════════════════════════════════════════════════════════
function emptyJournalCard(rows) {
  if(rows.length) return "";
  return `<div class="card">
    <div class="card-title">Decision Journal</div>
    <div class="empty">
      <div class="empty-icon">📋</div>
      <strong>No entries yet.</strong><br><br>
      Every daily briefing is automatically logged here with the full reasoning trace.<br>
      When you reply <strong>BUY</strong>, <strong>SKIP</strong>, or <strong>SELL</strong> in Telegram, that decision is recorded too.<br><br>
      Entries will appear after the next GitHub Actions run.
    </div>
  </div>`;
}

function renderJournal(rows) {
  const el=document.getElementById('pg-journal');
  if(!rows||!rows.length){el.innerHTML=emptyJournalCard([]);return;}

  const REPLY_BADGE={
    BUY:`<span class="pill pill-green">✅ BUY</span>`,
    SELL:`<span class="pill pill-red">📉 SELL</span>`,
    SKIP:`<span class="pill" style="background:#21262d;color:var(--muted)">⏭️ SKIP</span>`,
    HOLD:`<span class="pill pill-blue">⏸️ HOLD</span>`,
  };

  const html=rows.map(r=>{
    const ticker=r.recommended_ticker||r.rl_target||"—";
    const action=r.recommended_action||r.rl_action||"—";
    const conf  =r.confidence||"—";
    const vix   =r.vix?parseFloat(r.vix).toFixed(1):"?";
    const regime=r.regime||"?";
    const date  =r.date||"—";
    const human =r.human_command;

    let trace=[];
    try{trace=typeof r.why_trace==="string"?JSON.parse(r.why_trace):(r.why_trace||[]);}catch(_){}
    const tId="t"+r.id;

    const actionColor=ticker==="BIL"?"var(--red)":ticker==="SPY"?"var(--muted)":"var(--text)";
    const confDisp=conf!=="—"?`<span class="small muted" style="margin-left:8px">${conf}% confidence</span>`:"";

    return `<div class="jrow">
      <div class="jrow-header">
        <div>
          <div class="jrow-meta">${date} &nbsp;·&nbsp; ${regime} &nbsp;·&nbsp; VIX ${vix}</div>
          <div class="jrow-rec"><span class="ticker" style="color:${actionColor}">${action} ${ticker}</span>${confDisp}</div>
          ${r.abstain_reason?`<div class="small muted" style="margin-top:3px">ℹ️ ${r.abstain_reason}</div>`:""}
        </div>
        <div>${human&&REPLY_BADGE[human]?REPLY_BADGE[human]:`<span class="pill" style="background:#161b22;color:var(--muted);border:1px solid #30363d">⏳ No reply</span>`}</div>
      </div>
      ${r.news_headline?`<div class="jrow-headline">"${r.news_headline.slice(0,90)}${r.news_headline.length>90?"…":""}"</div>`:""}
      ${r.human_command?`<div class="jrow-reply"><strong>${r.human_command}</strong>${r.human_reason&&r.human_reason!=="(no reason given)"?` — ${r.human_reason}`:""}</div>`:""}
      ${trace.length?`
        <div class="trace-toggle" onclick="toggleEl('${tId}',this)">▶ Show decision trace (${trace.length} steps)</div>
        <div id="${tId}" class="trace-body">${trace.map(t=>`<div class="trace-item">${t}</div>`).join("")}</div>`:""}
    </div>`;
  }).join("");

  el.innerHTML=`<div class="card">
    <div class="card-title">Decision Journal — Last ${rows.length} Entries</div>
    <div class="small muted" style="margin-bottom:14px">Every daily briefing is logged here with the full reasoning trace. Your BUY/SKIP replies appear under each entry once logged via Telegram.</div>
    ${html}
  </div>`;
}

function toggleEl(id,btn){
  const el=document.getElementById(id);
  if(!el)return;
  const open=el.style.display!=="none"&&el.style.display!=="";
  if(open){el.style.display="none";btn.textContent=btn.textContent.replace("▼","▶");}
  else{el.style.display="block";btn.textContent=btn.textContent.replace("▶","▼");}
}

// ── Boot ──────────────────────────────────────────────────────────
init();
setTimeout(()=>location.reload(), 10*60*1000);
</script>
