name: Sector Command — Weekly Report

# Runs every Sunday at 20:00 UTC (4:00 PM EDT / 3:00 PM EST).
# 1. Generates the HTML research report and commits it to data/reports/.
# 2. Sends a rich Telegram summary: decisions recap, weekly P&L vs SPY,
#    equity alpha top 5, sector watchlist, and overall paper portfolio health.
on:
  schedule:
    - cron: "0 20 * * 0"   # Sunday 20:00 UTC
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements-full.txt

      - name: Generate weekly HTML report
        env:
          JOURNAL_DB: data/sector_command.db
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from engine.report_generator import generate_html_report
          path = generate_html_report()
          print(f'Report: {path}')
          "

      - name: Commit report
        run: |
          git config user.name "sector-command-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/reports/ || true
          git diff --cached --quiet || git commit -m "report: weekly $(date -u +%F)"
          git push || echo "push skipped"

      - name: Send rich Telegram weekly summary
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOURNAL_DB: data/sector_command.db
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python scripts/weekly_summary.py
