name: Sector Command — Weekly Report

# Generates an HTML research report every Sunday at 20:00 UTC
# and commits it to data/reports/ so it's viewable on the dashboard.
on:
  schedule:
    - cron: "0 20 * * 0"   # Sunday 20:00 UTC
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements-full.txt

      - name: Generate weekly HTML report
        env:
          JOURNAL_DB: data/sector_command.db
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from engine.report_generator import generate_html_report
          path = generate_html_report()
          print(f'Report: {path}')
          "

      - name: Commit report
        run: |
          git config user.name "sector-command-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/reports/ || true
          git diff --cached --quiet || git commit -m "report: weekly $(date -u +%F)"
          git push || echo "push skipped"
