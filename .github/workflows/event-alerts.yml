name: Sector Command — Event Alerts

# Triggered by cron-job.org Market Alerts job (4×/day via /cron/alerts endpoint).
# Schedule removed to prevent duplicate runs.
on:
  workflow_dispatch: {}

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-full.txt

      - name: Run event watcher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from engine.event_alerts import run
          from engine.journal import Journal
          # Pass current regime from last logged decision so regime-flip detection works
          current_regime = None
          try:
              j = Journal()
              recent = j.recent(1)
              if recent:
                  current_regime = recent[0].get('regime')
          except Exception:
              pass
          fired = run(current_regime=current_regime)
          print(f'Alerts fired: {len(fired) if fired else 0}')
          "
